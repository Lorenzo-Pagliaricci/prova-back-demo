apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: adr-gitlab-repo-remote
  title: Repository GitLab (Remote)
  description: Crea repository GitLab Spring Boot, crea pipeline Jenkins (<repo>-jenkinsJob), crea repository Nexus (<repo>-nexusartifact), avvia la prima build e registra nel Catalog.
  tags:
    - gitlab
    - repository
    - remote-template
spec:
  owner: user:development/guest
  type: service

  parameters:
    - title: Repository
      required:
        - name
      properties:
        name:
          title: Repository Name
          type: string
          description: Nome repository (es. cdm-meteo-service)
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true

  steps:
    - id: current-user
      name: Resolve GitLab user from token
      action: gitlab:user:info
      input:
        repoUrl: gitlab.com?owner=placeholder&repo=placeholder

    - id: create-nexus-repository
      name: Create Nexus maven hosted repository
      action: nexus:create-maven-hosted-repository
      input:
        repositoryName: ${{ parameters.name }}-nexusartifact
        versionPolicy: MIXED
        layoutPolicy: STRICT
        writePolicy: ALLOW
        blobStoreName: default
        strictContentTypeValidation: true
        online: true

    - id: ensure-jenkins-nexus-credentials
      name: Ensure Jenkins credentials for Nexus upload
      action: jenkins:ensure-username-password-credential
      input:
        credentialId: nexus-backstage
        description: Nexus credential managed by Backstage scaffolder
        jenkinsInstance: default
        overwrite: true

    - id: fetch-base
      name: Generate repository files
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          gitlabOwner: ${{ steps['current-user'].output.username }}
          gitlabProjectPath: ${{ steps['current-user'].output.username }}/${{ parameters.name }}
          jenkinsJobFullName: ${{ parameters.name }}-jenkinsJob
          nexusRepositoryName: ${{ steps['create-nexus-repository'].output.repositoryName }}
          nexusRepositoryUrl: ${{ steps['create-nexus-repository'].output.repositoryUrl }}
          jenkinsNexusCredentialsId: ${{ steps['ensure-jenkins-nexus-credentials'].output.credentialId }}
          mavenGroupId: com.example

    - id: publish-gitlab
      name: Create GitLab repository
      action: publish:gitlab
      input:
        repoUrl: gitlab.com?owner=${{ steps['current-user'].output.username }}&repo=${{ parameters.name }}
        defaultBranch: main
        repoVisibility: private

    - id: ensure-gitlab-maintainer
      name: Ensure GitLab Maintainer sparacoernesto
      action: gitlab:project-member:ensure
      input:
        projectId: ${{ steps['publish-gitlab'].output.projectId }}
        username: sparacoernesto
        accessLevel: Maintainer
        host: gitlab.com
        overwrite: true

    - id: create-jenkins-pipeline
      name: Create Jenkins pipeline job
      action: jenkins:create-pipeline
      input:
        repoUrl: ${{ steps['publish-gitlab'].output.remoteUrl }}
        jenkinsJobFullName: ${{ parameters.name }}-jenkinsJob
        gitBranch: main
        jenkinsfilePath: main.jenkinsfile
        jenkinsGitCredentialsId: accesso-prova-gitlab
        jenkinsInstance: default
        overwrite: true
        triggerBuild: true
        description: Pipeline created by Backstage for repository ${{ parameters.name }}

    - id: register-catalog
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-gitlab'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository GitLab
        url: ${{ steps['publish-gitlab'].output.remoteUrl }}
      - title: Repository Contents
        url: ${{ steps['publish-gitlab'].output.repoContentsUrl }}
      - title: Jenkins Pipeline Job
        url: ${{ steps['create-jenkins-pipeline'].output.jobUrl }}
      - title: Jenkins Queue Item
        url: ${{ steps['create-jenkins-pipeline'].output.queueUrl }}
      - title: Nexus Maven Repository
        url: ${{ steps['create-nexus-repository'].output.repositoryUrl }}
      - title: Open in Catalog
        entityRef: ${{ steps['register-catalog'].output.entityRef }}
